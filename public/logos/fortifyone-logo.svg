<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <!-- Black square icon -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#000000"/>
  <!-- Orbit icon (white) scaled to fit 64x64 box, centred at 32,32 -->
  <g transform="translate(32,32) scale(0.55)">
    <path d="M 25 -25 A 35 35 0 1 1 -25 25" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round"/>
    <path d="M -25 25 A 35 35 0 0 1 25 -25" fill="none" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-dasharray="8 5"/>
    <circle cx="0" cy="0" r="7" fill="white"/>
    <circle cx="25" cy="-25" r="5.5" fill="white"/>
    <circle cx="-25" cy="25" r="5.5" fill="white"/>
  </g>
  <!-- Wordmark: Fortify (white) + One (teal) -->
  <text x="76" y="24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#F1F5F9">Fortify</text>
  <text x="188" y="24" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="26" font-weight="700" letter-spacing="-0.5" fill="#06B6D4">One</text>
  <!-- Tagline -->
  <text x="76" y="46" font-family="Inter,'Segoe UI',system-ui,sans-serif" font-size="11" font-weight="400" letter-spacing="0.1" fill="#94A3B8">GRC platform for UK SMEs</text>
</svg>
