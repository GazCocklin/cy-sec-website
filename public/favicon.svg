<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0B1D3A"/>
      <stop offset="55%"  stop-color="#0E5F8A"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <!-- Rounded-square background — matches FortifyLearn and FortifyOne favicons -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  <!-- Dual concentric C — brand initial + layered defense semantics.
       Stroke-linecap butt gives squared terminals that rhyme with Segoe UI's capital C. -->
  <g transform="translate(50,50)" fill="none" stroke="white" stroke-linecap="butt">
    <path d="M 22 -22 A 30 30 0 1 0 22 22" stroke-width="7"/>
    <path d="M 12 -12 A 17 17 0 1 0 12 12" stroke-width="6"/>
  </g>
</svg>
